# Server Configuration
server:
  port: 8080
    
# Application Configuration
spring:
  application:
    name: tiny-url

  datasource:
    url: jdbc:h2:mem:mydb
    username: sa
    password: password
    driverClassName: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    h2:
      console:
        enabled: false


# Logging Configuration
logging:
  level:
    com.origin.takehome: DEBUG